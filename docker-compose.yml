services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: habiflow
      POSTGRES_USER: habiflow
      POSTGRES_PASSWORD: habiflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habiflow -d habiflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://habiflow:habiflow@postgres:5432/habiflow
      CORS_ORIGIN: "*"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
